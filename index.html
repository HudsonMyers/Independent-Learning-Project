<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent Learning Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white shadow-xl rounded-lg p-8 w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-indigo-800 mb-6">Independent Learning Project</h1>

        <div class="mb-4">
            <label for="collegeDropdown" class="block text-sm font-medium text-gray-700">Select College:</label>
            <select id="collegeDropdown" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                <option value="">Select College</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="majorDropdown" class="block text-sm font-medium text-gray-700">Select Major:</label>
            <select id="majorDropdown" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" disabled>
                <option value="">Select Major</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="courseInput" class="block text-sm font-medium text-gray-700">Course Name or Code:</label>
            <input type="text" id="courseInput" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="e.g., Intro to Psychology">
        </div>

        <div class="flex justify-center mb-6">
            <button id="setCourse" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md shadow-md transition duration-300 ease-in-out">Set Course</button>
        </div>

        <p id="errorMessage" class="text-red-500 text-sm text-center mb-4 hidden"></p>

        <div id="quizSection" class="border-t pt-6 mt-6 border-gray-200">
            <h2 id="courseHeader" class="text-xl font-semibold text-center text-gray-800 mb-4 hidden"></h2>
            
            <div class="mb-4 hidden" id="unitDropdown">
                <label for="unitDropdown" class="block text-sm font-medium text-gray-700">Select Unit:</label>
                <select id="unitDropdown" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></select>
            </div>
            
            <div class="mb-4 hidden" id="topicInput">
                <label for="topicInput" class="block text-sm font-medium text-gray-700">Specific Topic:</label>
                <input type="text" id="topicInput" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="e.g., Cognitive Dissonance">
            </div>

            <div class="mb-6 hidden" id="difficultySlider">
                <label for="difficultySldr" class="block text-sm font-medium text-gray-700">Difficulty: <span id="difficultyValue">5</span></label>
                <input type="range" min="1" max="10" value="5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" id="difficultySldr">
            </div>
            
            <div class="flex justify-center hidden" id="generateBtnContainer">
                <button id="generateBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md shadow-md transition duration-300 ease-in-out">Generate Question</button>
            </div>

            <div id="quizContent" class="mt-6">
                <p id="questionText" class="text-lg font-medium text-gray-900 mb-4 hidden"></p>
                
                <div id="answerButtons" class="space-y-4">
                    <button id="answerBtnA" class="answer-btn w-full px-4 py-3 bg-gray-200 text-gray-800 rounded-lg shadow-sm hover:bg-gray-300 transition duration-300 ease-in-out">
                        <span id="answerTextA" class="font-medium text-left block hidden"></span>
                    </button>
                    <button id="answerBtnB" class="answer-btn w-full px-4 py-3 bg-gray-200 text-gray-800 rounded-lg shadow-sm hover:bg-gray-300 transition duration-300 ease-in-out">
                        <span id="answerTextB" class="font-medium text-left block hidden"></span>
                    </button>
                    <button id="answerBtnC" class="answer-btn w-full px-4 py-3 bg-gray-200 text-gray-800 rounded-lg shadow-sm hover:bg-gray-300 transition duration-300 ease-in-out">
                        <span id="answerTextC" class="font-medium text-left block hidden"></span>
                    </button>
                    <button id="answerBtnD" class="answer-btn w-full px-4 py-3 bg-gray-200 text-gray-800 rounded-lg shadow-sm hover:bg-gray-300 transition duration-300 ease-in-out">
                        <span id="answerTextD" class="font-medium text-left block hidden"></span>
                    </button>
                </div>

                <p id="feedbackText" class="mt-4 text-center font-bold text-xl hidden"></p>
            </div>
        </div>
    </div>

    <script>
        // WARNING: This API key is exposed in the client-side code for demonstration purposes.
        // In a production environment, this key should be stored securely on a server.
        const OPENAI_API_KEY = "sk-proj-761h8f7J9Yj3e4E8w7jT2z0h1d7G7C9F9l6c4O7B3n6M3j7P";
        
        let correctAnswer = '';
        let answerOptions = {};

        const collegeMajors = {
          "Coastal Carolina University": ["Marine Science", "Business Administration", "Computer Science", "Exercise and Sport Science", "Physical Education"],
          "North Carolina State University": ["Engineering", "Computer Science", "Agricultural Sciences", "Supply Chain Management and Logistics", "Textile Engineering"],
          "University of Alabama": ["Political Science", "Nursing", "Business", "Management Information Systems", "Psychology"],
          "Wake Technical Community College": ["Liberal Arts", "Information Technology", "Business", "Registered Nursing", "Construction", "GM ASEP"],
          "Georgia Institute of Technology": ["Aerospace Engineering", "Computer Science", "Industrial Design", "Biomedical Engineering"]
        };

        function hideAllQuizElements() {
            document.getElementById('unitDropdown').classList.add('hidden');
            document.getElementById('topicInput').classList.add('hidden');
            document.getElementById('generateBtnContainer').classList.add('hidden');
            document.getElementById('difficultySlider').classList.add('hidden');
            document.getElementById('questionText').classList.add('hidden');
            document.getElementById('courseHeader').classList.add('hidden');
            hideAnswerButtons();
            hideAnswerTexts();
            document.getElementById('feedbackText').classList.add('hidden');
        }

        function hideAnswerButtons() {
            ['A', 'B', 'C', 'D'].forEach(letter => document.getElementById(`answerBtn${letter}`).classList.add('hidden'));
        }

        function showAnswerButtons() {
            ['A', 'B', 'C', 'D'].forEach(letter => document.getElementById(`answerBtn${letter}`).classList.remove('hidden'));
        }

        function hideAnswerTexts() {
            ['A', 'B', 'C', 'D'].forEach(letter => document.getElementById(`answerText${letter}`).classList.add('hidden'));
        }

        function populateCollegeDropdown() {
            const collegeDropdown = document.getElementById('collegeDropdown');
            collegeDropdown.innerHTML = '<option value="">Select College</option>';
            Object.keys(collegeMajors).forEach(college => {
                const opt = document.createElement('option');
                opt.value = college;
                opt.textContent = college;
                collegeDropdown.appendChild(opt);
            });
            collegeDropdown.disabled = false;
        }

        function populateMajorDropdown(collegeName) {
            const majorDropdown = document.getElementById('majorDropdown');
            majorDropdown.innerHTML = '<option value="">Select Major</option>';
            const majors = collegeMajors[collegeName] || [];
            majors.forEach(major => {
                const opt = document.createElement('option');
                opt.value = major;
                opt.textContent = major;
                majorDropdown.appendChild(opt);
            });
            majorDropdown.disabled = false;
        }

        async function callOpenAI(prompt) {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${OPENAI_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                        { role: "system", content: "You are an expert college professor who ONLY provides a JSON array of specific, non-generic unit titles." },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.7,
                    max_tokens: 1000
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`OpenAI API error: ${response.status} - ${errorText}`);
            }
            const data = await response.json();
            return data.choices?.[0]?.message?.content;
        }

        function isGenericUnits(units) {
            if (!Array.isArray(units)) return true;
            if (units.length < 2) return true;
            const genericLabels = new Set(["Unit 1", "Unit 2", "Unit 3"]);
            return units.every(u => genericLabels.has(u.label) && u.label === u.value);
        }

        async function getUnitsWithFallback(basePrompt) {
            try {
                const content = await callOpenAI(basePrompt);
                if (content) {
                    const jsonMatch = content.match(/\[.*\]/s);
                    if (jsonMatch) {
                        const units = JSON.parse(jsonMatch[0]);
                        if (!isGenericUnits(units)) {
                            return units;
                        }
                    }
                }
            } catch (e) {
                console.error("Failed to generate units from OpenAI:", e.message);
            }
            
            const strongerPrompt = `${basePrompt}\n\nReminder: DO NOT return generic labels like "Unit 1". Provide real descriptive unit titles specific to the course.`;
            try {
                const content = await callOpenAI(strongerPrompt);
                if (content) {
                    const jsonMatch = content.match(/\[.*\]/s);
                    if (jsonMatch) {
                        const units = JSON.parse(jsonMatch[0]);
                        if (!isGenericUnits(units)) {
                            return units;
                        }
                    }
                }
            } catch (e) {
                console.error("Failed to generate units with stronger prompt:", e.message);
            }
            
            return [
                { label: "Unit 1", value: "Unit 1" },
                { label: "Unit 2", value: "Unit 2" },
                { label: "Unit 3", value: "Unit 3" }
            ];
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateCollegeDropdown();
            hideAllQuizElements();

            document.getElementById('collegeDropdown').addEventListener('change', () => {
                const selectedCollege = document.getElementById('collegeDropdown').value;
                if (selectedCollege) populateMajorDropdown(selectedCollege);
                else {
                    document.getElementById('majorDropdown').innerHTML = '<option value="">Select Major</option>';
                    document.getElementById('majorDropdown').disabled = true;
                }
                document.getElementById('majorDropdown').value = '';
                document.getElementById('courseInput').value = '';
                hideAllQuizElements();
            });

            document.getElementById('setCourse').addEventListener('click', async () => {
                try {
                    const college = document.getElementById('collegeDropdown').value;
                    const major = document.getElementById('majorDropdown').value;
                    const course = document.getElementById('courseInput').value.trim();

                    if (!college || !major || !course) {
                        document.getElementById('errorMessage').textContent = "Please complete all fields to set the course.";
                        document.getElementById('errorMessage').classList.remove('hidden');
                        hideAllQuizElements();
                        return;
                    }

                    document.getElementById('errorMessage').classList.add('hidden');
                    const unitDropdown = document.getElementById('unitDropdown');
                    unitDropdown.innerHTML = '<option value="">Loading units...</option>';
                    unitDropdown.disabled = true;
                    
                    const courseTrimmed = course.trim();
                    const basePrompt = `You are a college professor listing 12 detailed and specific unit names for the course "${courseTrimmed}" offered at ${college} for a ${major} major.
                    Provide ONLY a JSON array of objects with "label" and "value" fields for each unit. Do NOT include any text or explanation.
                    Avoid generic unit labels like "Unit 1", "Unit 2", etc. Provide actual meaningful titles.`;

                    const units = await getUnitsWithFallback(basePrompt);

                    if (units.length > 0) {
                        unitDropdown.innerHTML = '<option value="">Select Unit</option>';
                        units.forEach(unit => {
                            const opt = document.createElement('option');
                            opt.value = unit.value;
                            opt.textContent = unit.label;
                            unitDropdown.appendChild(opt);
                        });
                        unitDropdown.disabled = false;
                        unitDropdown.classList.remove('hidden');
                        document.getElementById('topicInput').classList.remove('hidden');
                        document.getElementById('difficultySlider').classList.remove('hidden');
                        document.getElementById('generateBtnContainer').classList.remove('hidden');
                        document.getElementById('courseHeader').textContent = `${college} • ${major} • ${course}`;
                        document.getElementById('courseHeader').classList.remove('hidden');
                    } else {
                        document.getElementById('errorMessage').textContent = "Failed to load units. Please try again.";
                        document.getElementById('errorMessage').classList.remove('hidden');
                    }
                } catch (error) {
                    console.error("Error setting course:", error);
                    document.getElementById('errorMessage').textContent = `Failed to load units. Error: ${error.message}`;
                    document.getElementById('errorMessage').classList.remove('hidden');
                }
            });

            document.getElementById('generateBtn').addEventListener('click', async () => {
                try {
                    const college = document.getElementById('collegeDropdown').value;
                    const major = document.getElementById('majorDropdown').value;
                    const course = document.getElementById('courseInput').value.trim();
                    const unit = document.getElementById('unitDropdown').value;
                    const topic = document.getElementById('topicInput').value;
                    const difficulty = parseInt(document.getElementById('difficultySldr').value);

                    if (!college || !major || !course || !unit || !topic) {
                        document.getElementById('questionText').textContent = "Please fill in all fields.";
                        document.getElementById('questionText').classList.remove('hidden');
                        hideAnswerButtons();
                        hideAnswerTexts();
                        document.getElementById('feedbackText').classList.add('hidden');
                        return;
                    }

                    document.getElementById('questionText').textContent = "Generating question...";
                    document.getElementById('questionText').classList.remove('hidden');
                    hideAnswerButtons();
                    hideAnswerTexts();
                    document.getElementById('feedbackText').classList.add('hidden');

                    const stylesByCategory = {
                      technical: [
                        "Code debugging task", "Code writing/building task", "Algorithm optimization", "System architecture analysis", "Output prediction from given code"
                      ],
                      analytical: [
                        "Data interpretation", "Scenario-based problem-solving", "Case study analysis", "Process design question", "Multi-step calculation"
                      ],
                      scientific: [
                        "Experimental design", "Data/graph interpretation", "Diagnosis from observations", "Fieldwork planning", "Calculation-heavy measurement problem"
                      ]
                    };

                    let category;
                    if (["Computer Science", "Information Technology", "Management Information Systems", "Engineering", "Supply Chain Management and Logistics", "Textile Engineering"].includes(major)) {
                      category = "technical";
                    } else if (["Business Administration", "Business", "Political Science", "Industrial Design"].includes(major)) {
                      category = "analytical";
                    } else {
                      category = "scientific";
                    }

                    const styleOptions = stylesByCategory[category];
                    const randomStyle = styleOptions[Math.floor(Math.random() * styleOptions.length)];

                    let difficultyDescription;
                    if (difficulty >= 1 && difficulty <= 3) difficultyDescription = "easy, base-level";
                    else if (difficulty >= 4 && difficulty <= 7) difficultyDescription = "standard, course-appropriate";
                    else if (difficulty >= 8 && difficulty <= 10) difficultyDescription = "extremely difficult, complex, or multi-step";
                    else difficultyDescription = "standard, course-appropriate";

                    const prompt = `You are a college professor designing a rigorous, course-appropriate multiple-choice quiz question.
                    
                    Generate an **${difficultyDescription}** question in the style of a **${randomStyle.toLowerCase()}**.
                    
                    Major: ${major}
                    Course: ${course}
                    Unit: ${unit}
                    Topic: ${topic}
                    
                    Create ONE multiple-choice question that:
                    - **Bases the entire question's scenario on a verifiable, interesting fact about the chosen ${topic}.**
                    - **Does NOT explicitly state "Fun fact:"**. Instead, the fact must be woven seamlessly into the problem statement.
                    - question output format should vary depending on ${stylesByCategory} and ${difficulty} offering word problems, code block debugging/correcting, math problems, etc. 
                    - Requires the student to apply concepts from the ${course} and ${unit} to solve a problem related to that fact.
                    - Matches the academic depth of an actual quiz, test, or homework question in a ${course} course at ${college}.
                    - Is specific to the major and reflects the skills actually assessed in the unit "${unit}".
                    - Avoids generic definitions; instead, focus on real techniques, methods, problem-solving, or analysis.
                    - Uses real academic language and structure used in college assessments.
                    - Provides 4 answer choices labeled A–D, with one correct and clearly defensible answer.
                    - Does NOT assume knowledge outside of what’s commonly taught in the selected unit/topic.
                    - If the topic is repeated, use a different fact for the new question.
                    
                    Return ONLY in this format:
                    Question: [Your question here]
                    A. [Option A]
                    B. [Option B]
                    C. [Option C]
                    D. [Option D]
                    Correct Answer: [A/B/C/D]`;

                    const content = await callOpenAI(prompt);

                    const correctIndex = content.indexOf("Correct Answer:");
                    if (correctIndex === -1) throw new Error("Invalid response format: 'Correct Answer:' not found.");

                    const rawQuestionAndOptions = content.substring(0, correctIndex).trim();
                    const rawCorrectAnswer = content.substring(correctIndex + "Correct Answer:".length).trim();

                    const lines = rawQuestionAndOptions.split('\n');
                    const questionIndex = lines.findIndex(line => line.toLowerCase().startsWith("question:"));
                    const optionAIndex = lines.findIndex(line => line.startsWith("A."));

                    if (questionIndex === -1 || optionAIndex === -1) throw new Error("Invalid response format: Question or options not found.");

                    const questionLines = lines.slice(questionIndex, optionAIndex);
                    const questionText = questionLines.join('\n').replace(/^(Question|Q)\.\s*/i, '').trim();
                    const optionsText = lines.slice(optionAIndex).join('\n');

                    answerOptions = {};
                    const optionMatches = optionsText.match(/[A-D]\.\s*[\s\S]+?(?=\n[B-D]\.|$)/g);
                    if (optionMatches) {
                        optionMatches.forEach(match => {
                            const key = match[0];
                            const value = match.substring(2).trim();
                            answerOptions[key] = value;
                        });
                    }

                    correctAnswer = rawCorrectAnswer.toUpperCase().match(/[A-D]/)[0];

                    document.getElementById('questionText').textContent = questionText;
                    document.getElementById('questionText').classList.remove('hidden');
                    showAnswerButtons();

                    ['A', 'B', 'C', 'D'].forEach(letter => {
                        const textEl = document.getElementById(`answerText${letter}`);
                        textEl.textContent = answerOptions[letter] || '';
                        textEl.classList.remove('hidden');
                    });

                    document.getElementById('feedbackText').classList.add('hidden');

                } catch (error) {
                    console.error("Generation error:", error);
                    document.getElementById('questionText').textContent = `Failed to generate question. Error: ${error.message}`;
                    document.getElementById('questionText').classList.remove('hidden');
                    hideAnswerButtons();
                    hideAnswerTexts();
                    document.getElementById('feedbackText').classList.add('hidden');
                }
            });

            ['A', 'B', 'C', 'D'].forEach(letter => {
                document.getElementById(`answerBtn${letter}`).addEventListener('click', () => {
                    if (!correctAnswer) return;
                    const feedbackEl = document.getElementById('feedbackText');
                    if (letter.toUpperCase() === correctAnswer) {
                        feedbackEl.textContent = "✅ Correct!";
                        feedbackEl.style.color = '#10B981';
                    } else {
                        const correctText = answerOptions[correctAnswer] || '';
                        feedbackEl.textContent = `❌ Incorrect. The correct answer was: ${correctAnswer}. ${correctText}`;
                        feedbackEl.style.color = '#EF4444';
                    }
                    feedbackEl.classList.remove('hidden');
                });
            });

            document.getElementById('difficultySldr').addEventListener('input', (event) => {
                document.getElementById('difficultyValue').textContent = event.target.value;
            });
        });
    </script>
</body>
</html>
